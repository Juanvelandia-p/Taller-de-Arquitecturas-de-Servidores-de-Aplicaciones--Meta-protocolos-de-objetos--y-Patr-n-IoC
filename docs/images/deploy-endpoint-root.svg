<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#0f172a"/>
  <rect x="20" y="20" width="1160" height="320" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="40" y="60" fill="#67e8f9" font-family="Consolas, 'Courier New', monospace" font-size="24">Prueba endpoint raíz</text>
  <text x="40" y="105" fill="#e2e8f0" font-family="Consolas, 'Courier New', monospace" font-size="20">$ curl.exe -i http://localhost:34000/</text>
  <text x="40" y="150" fill="#86efac" font-family="Consolas, 'Courier New', monospace" font-size="20">HTTP/1.1 200 OK</text>
  <text x="40" y="182" fill="#86efac" font-family="Consolas, 'Courier New', monospace" font-size="20">Content-Type: text/html</text>
  <text x="40" y="214" fill="#86efac" font-family="Consolas, 'Courier New', monospace" font-size="20">Content-Length: 2506</text>
  <text x="40" y="257" fill="#d1d5db" font-family="Consolas, 'Courier New', monospace" font-size="18">Respuesta: index.html renderizado desde src/main/resources/webroot.</text>
  <text x="40" y="293" fill="#f9a8d4" font-family="Consolas, 'Courier New', monospace" font-size="18">Evidencia: endpoint / disponible tras despliegue en contenedor.</text>
</svg>